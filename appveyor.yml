# اختيار صورة ويندوز مدعومة (مثال لو على AppVeyor)
image: Visual Studio 2022

# تعطيل الـ build الافتراضي
build: off

# سكربت PowerShell لتجهيز RDP + Tailscale
build_script:
  - ps: |
      # 1. تفعيل إعدادات RDP
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

      # 2. فتح منفذ RDP في الجدار الناري
      netsh advfirewall firewall delete rule name="RDP-Tailscale" | Out-Null
      netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 | Out-Null
      Restart-Service -Name TermService -Force

      # 3. إنشاء مستخدم RDP بباسورد ثابت قوي وتخزينه في ملف
      $username = "RDPUser"
      $password = "MyRdpPass123!@#"
      if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
      }
      # حفظ بيانات الدخول في ملف نصي
      Set-Content -Path "C:\rdp_credentials.txt" -Value "Username: $username`nPassword: $password"

      # 4. تحميل وتثبيت Tailscale MSI من الرابط الرسمي
      $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.66.4-amd64.msi"
      $installerPath = "$env:TEMP\tailscale.msi"
      Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
      Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
      Remove-Item $installerPath -Force

      # 5. التحقق من وجود tailscale.exe
      $tsPath = "$env:ProgramFiles\Tailscale\tailscale.exe"
      $retries = 0
      while (-not (Test-Path $tsPath) -and $retries -lt 12) {
          Write-Host "جاري الانتظار حتى يكتمل التثبيت..."
          Start-Sleep -Seconds 5
          $retries++
      }

      # 6. تشغيل Tailscale وربط السيرفر
      if (Test-Path $tsPath) {
          & $tsPath up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=windows-rdp-server
          Write-Host "=========================================="
          Write-Host "السيرفر شغال ومتصل بـ Tailscale الآن بنجاح!"
          Write-Host "بيانات الدخول محفوظة في: C:\rdp_credentials.txt"
          Write-Host "=========================================="
      } else {
          Write-Host "فشل تثبيت Tailscale!"
      }

      # 7. إبقاء السيرفر نشط
      Start-Sleep -Seconds 3600
